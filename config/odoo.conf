[options]
; Cesty k modulům
; /usr/lib/python3/dist-packages/odoo/addons = standardní Odoo moduly (v image)
; /mnt/extra-addons = tvoje vlastní moduly (mount z ./addons)
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Databáze
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False
; db_name = False → umožní vytvořit DB přes web UI při prvním spuštění
; Až budeš mít produkční DB, nastav: db_name = odoo_label

; Admin heslo (pro správu databází přes /web/database/manager)
admin_passwd = label-admin-2026

; Vývojový režim
dev_mode = reload,xml

; Logování
log_level = info
; Pro debug: log_level = debug
; Pro SQL debug: log_handler = odoo.sql_db:DEBUG

; Výkon
workers = 0
; workers = 0 → single-threaded (ideální pro vývoj)
; Pro produkci na i3: workers = 2

; Limit paměti (pro produkci)
; limit_memory_hard = 2684354560
; limit_memory_soft = 2147483648

; Jazyk
; Výchozí jazyk se nastaví při vytvoření DB
