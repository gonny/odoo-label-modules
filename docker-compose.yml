services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile.odoo
    image: odoo:19
    container_name: odoo-label
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - odoo-data:/var/lib/odoo
    environment:
      - HOST=db
      - PORT=5432
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:-odoo}
      # Carrier API keys (from Doppler)
      - PACKETA_API_KEY=${PACKETA_API_KEY:-}
      - PACKETA_API_PASSWORD=${PACKETA_API_PASSWORD:-}
      - DPD_API_KEY=${DPD_API_KEY:-}
      - DPD_API_DSW=${DPD_API_DSW:-}
      - CZECH_POST_API_KEY=${CZECH_POST_API_KEY:-}
      - CZECH_POST_SECRET_KEY=${CZECH_POST_SECRET_KEY:-}
    command: ["--dev=reload,xml"]
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: odoo-label-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  odoo-data:
    name: odoo-label-data
  db-data:
    name: odoo-label-db