services:
  odoo:
    image: odoo:19
    container_name: odoo-label
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
    volumes:
      # Tvoje vlastní moduly – LIVE mount z disku
      - ./addons:/mnt/extra-addons
      # Konfigurace Odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      # Persistentní data (filestore, sessions)
      - odoo-data:/var/lib/odoo
    environment:
      - HOST=db
      - PORT=5432
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:-odoo}
    # Dev mode: auto-reload Python + XML hot reload
    command: ["--dev=reload,xml"]
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: odoo-label-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    ports:
      # Pro přímý přístup k DB (debug, pgAdmin)
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  odoo-data:
    name: odoo-label-data
  db-data:
    name: odoo-label-db
