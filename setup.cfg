[tool:pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --tb=short
    -W ignore::DeprecationWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[flake8]
max-line-length = 88
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    migrations,
    .eggs
max-complexity = 10
ignore = E203, E266, W503

[isort]
profile = black
line_length = 88
skip = .git,.venv,venv,__pycache__,migrations

[pylint]
max-line-length = 88
disable = 
    C0111,
    C0103,
    R0903,
    R0913,
    W0212,
    fixme
